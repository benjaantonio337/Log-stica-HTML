<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Staff - Atitermic SpA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-primary">ATITERMIC</h3>
                            <p class="text-muted small">SISTEMA DE GESTIÓN INTERNA</p>
                        </div>
                        <form>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Usuario</label>
                                <input type="text" class="form-control shadow-sm">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Contraseña</label>
                                <input type="password" class="form-control shadow-sm">
                            </div>
                            <a href="app-dashboard.html" class="btn btn-primary w-100 py-2 fw-bold shadow">Entrar al Portal</a>
                            <div class="text-center mt-4">
                                <a href="index.html" class="text-decoration-none small text-muted">← Volver a la Web Pública</a>
                            </div>
                        </form>
                    </div>
                </div>
                <p class="text-center text-white-50 mt-4 small">Atitermic SpA Logística v1.0</p>
            </div>
        </div>
    </div>
</body>
</html>
