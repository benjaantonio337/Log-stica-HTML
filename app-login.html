<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Staff - Atitermic SpA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">

                <h3 class="fw-bold text-dark">ATITERMIC</h3>

                <form class="mt-4">
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Usuario">
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Contraseña">
                    </div>
                    <button class="btn btn-primary w-100 shadow py-2 fw-bold">Entrar al Sistema</button>
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left pe-1"></i>Volver al sitio público</a>

            </div>
