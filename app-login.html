<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Plataforma Atitermic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; background: linear-gradient(rgba(0, 45, 94, 0.9), rgba(0, 45, 94, 0.9)), url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80'); background-size: cover; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 border-0 shadow-lg text-center">
                    <h2 class="fw-bold text-primary mb-3">ATITERMIC</h2>
                    <p class="text-muted small mb-4">Acceso exclusivo para técnicos y administración</p>
                    <form>
                        <div class="mb-3 text-start">
                            <label class="form-label small fw-bold text-uppercase">RUT / Usuario</label>
                            <input type="text" class="form-control border-0 bg-light p-3">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label small fw-bold text-uppercase">Contraseña</label>
                            <input type="password" class="form-control border-0 bg-light p-3">
                        </div>
                        <button class="btn btn-primary w-100 p-3 fw-bold mb-3">INGRESAR AL SISTEMA</button>
                        <a href="index.html" class="text-decoration-none small text-muted">← Volver al sitio principal</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
